<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="SANGARSH BADMIN2K26 — Inter-College Badminton Championship"/>
<title>SANGARSH BADMIN2K26</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@300;400;500;600;700&family=Nunito+Sans:wght@300;400;600;700&display=swap"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
/* ── Tokens ──────────────────────────────────────────────────────────────── */
:root{
  --white:#FFF;--off-white:#F5F3EE;--cream:#EDE9E0;
  --black:#0A0A08;--black-soft:#111110;--black-muted:#1C1C1A;--charcoal:#2A2A27;--ash:#4A4A45;--fog:#8A8A82;
  --orange:#FF5C1A;--orange-hot:#FF3D00;--orange-warm:#FF7A40;--orange-dim:rgba(255,92,26,.13);
  --orange-glow:0 0 30px rgba(255,92,26,.4),0 0 80px rgba(255,92,26,.15);
  --lime:#C8F135;--border-dark:rgba(255,255,255,.07);--border-orange:rgba(255,92,26,.35);
  --font-display:'Anton',sans-serif;--font-heading:'Oswald',sans-serif;--font-body:'Nunito Sans',sans-serif;
  --ease-expo:cubic-bezier(.16,1,.3,1);--ease-back:cubic-bezier(.34,1.56,.64,1);--ease-io:cubic-bezier(.65,0,.35,1);
  --gutter:clamp(1.25rem,5vw,3rem);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--black);color:var(--white);-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit;outline:none}
select option{background:var(--black-muted);color:var(--white)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--black)}::-webkit-scrollbar-thumb{background:var(--orange);border-radius:9px}

/* ── Animations ──────────────────────────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideLeft{from{opacity:0;transform:translateX(-50px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes pulseOrange{0%,100%{box-shadow:0 0 0 0 rgba(255,92,26,.5)}50%{box-shadow:0 0 0 18px rgba(255,92,26,0)}}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes shimmer{0%{left:-100%}100%{left:200%}}
@keyframes rowIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.page-in{animation:fadeIn .4s var(--ease-expo) both}

/* ── Utilities ────────────────────────────────────────────────────────────── */
.wrap{width:100%;max-width:1180px;margin-inline:auto;padding-inline:var(--gutter)}
.sec{padding-block:clamp(4rem,8vw,7rem)}

/* ── Nav ─────────────────────────────────────────────────────────────────── */
.nav{position:fixed;inset-block-start:0;inset-inline:0;z-index:999;display:flex;align-items:center;justify-content:space-between;padding:.9rem var(--gutter);background:rgba(10,10,8,.78);backdrop-filter:blur(22px);border-bottom:1px solid var(--border-dark);animation:fadeIn .6s var(--ease-expo) both}
.nav-wm{display:flex;align-items:baseline;gap:.3rem;font-family:var(--font-display);letter-spacing:.04em}
.nav-wm-m{font-size:1.45rem;color:var(--white)}
.nav-wm-y{font-size:.95rem;color:var(--orange)}
.nav-btn{display:flex;align-items:center;gap:.45rem;padding:.55rem 1.4rem;background:var(--orange);color:var(--white);font-family:var(--font-heading);font-size:.85rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;border-radius:3px;position:relative;overflow:hidden;transition:background .15s,transform .15s,box-shadow .15s}
.nav-btn:after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);animation:shimmer 2.5s ease-in-out infinite}
.nav-btn:hover{background:var(--orange-hot);transform:translateY(-1px);box-shadow:0 6px 24px rgba(255,92,26,.45)}

/* ── Hero ─────────────────────────────────────────────────────────────────── */
.hero{position:relative;min-height:100svh;display:grid;place-items:center;overflow:hidden;padding-top:5rem}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-bg img{width:100%;height:100%;object-fit:cover;object-position:center 30%;filter:brightness(.22) contrast(1.1) saturate(.7);animation:fadeIn 1.5s both}
.hero-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 40%,rgba(255,92,26,.08) 0%,transparent 70%),linear-gradient(to bottom,rgba(10,10,8,.4) 0%,rgba(10,10,8,.2) 50%,rgba(10,10,8,.98) 100%)}
.hero-stripe{position:absolute;top:0;right:0;width:35%;height:100%;background:linear-gradient(135deg,transparent 0%,rgba(255,92,26,.03) 100%);clip-path:polygon(30% 0,100% 0,100% 100%,0% 100%);z-index:1}
.hero-in{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:1.6rem;text-align:center;max-width:900px;padding-inline:var(--gutter)}
.hero-lbl{display:inline-flex;align-items:center;gap:.6rem;padding:.45rem 1.1rem;border:1px solid var(--orange);border-radius:2px;font-family:var(--font-heading);font-size:.78rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--orange);animation:fadeUp .7s var(--ease-expo) .2s both}
.hero-dot{width:7px;height:7px;border-radius:50%;background:var(--orange);flex-shrink:0;animation:pulseOrange 2s ease-in-out infinite}
.hero-h1{font-family:var(--font-display);font-size:clamp(3rem,10vw,8.5rem);line-height:.88;letter-spacing:-.01em;text-transform:uppercase;animation:fadeUp .8s var(--ease-expo) .35s both}
.hero-l1{display:block;color:var(--white)}
.hero-l2{display:block;-webkit-text-fill-color:transparent;-webkit-text-stroke:2px var(--orange);color:transparent}
.hero-l3{display:block;color:var(--orange)}
.hero-tn{font-family:var(--font-heading);font-size:clamp(1rem,2.5vw,1.45rem);font-weight:300;letter-spacing:.35em;text-transform:uppercase;color:var(--fog);animation:fadeUp .8s var(--ease-expo) .5s both}
.hero-tn strong{color:var(--cream);font-weight:700}
.hero-ctas{display:flex;flex-direction:column;align-items:center;gap:.9rem;animation:fadeUp .8s var(--ease-expo) .65s both}
.cta-prim{display:inline-flex;align-items:center;gap:.75rem;padding:1.2rem 3.5rem;background:var(--orange);color:var(--white);font-family:var(--font-display);font-size:1.25rem;letter-spacing:.06em;text-transform:uppercase;border-radius:3px;position:relative;overflow:hidden;transition:transform .3s var(--ease-expo),box-shadow .3s var(--ease-expo);animation:pulseOrange 3s ease-in-out 2s infinite}
.cta-prim:hover{transform:translateY(-3px) scale(1.02);box-shadow:var(--orange-glow)}
.cta-sec{font-family:var(--font-heading);font-size:.82rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--fog);display:flex;align-items:center;gap:.4rem;transition:color .15s}
.cta-sec:hover{color:var(--white)}
.hero-scroll{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);z-index:2;display:flex;flex-direction:column;align-items:center;gap:.4rem;font-family:var(--font-heading);font-size:.63rem;letter-spacing:.2em;text-transform:uppercase;color:var(--fog);animation:fadeIn 1s 1.5s both}
.hero-scroll-ln{width:1px;height:38px;background:linear-gradient(to bottom,var(--fog),transparent)}

/* ── Ticker ───────────────────────────────────────────────────────────────── */
.ticker-wrap{background:var(--orange);overflow:hidden;padding:.65rem 0}
.ticker-tr{display:flex;white-space:nowrap;animation:ticker 22s linear infinite}
.ticker-it{display:inline-flex;align-items:center;gap:1rem;padding-inline:2rem;font-family:var(--font-heading);font-size:.85rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--white);flex-shrink:0}
.ticker-sep{width:6px;height:6px;background:rgba(255,255,255,.5);clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%)}

/* ── Section Common ───────────────────────────────────────────────────────── */
.sec-overline{display:flex;align-items:center;gap:.75rem;font-family:var(--font-heading);font-size:.72rem;font-weight:500;letter-spacing:.28em;text-transform:uppercase;color:var(--orange);margin-bottom:.75rem}
.sec-overline::before{content:'';display:block;width:28px;height:2px;background:var(--orange)}
.sec-h{font-family:var(--font-display);font-size:clamp(2.8rem,6vw,5.2rem);line-height:.9;letter-spacing:-.01em;text-transform:uppercase;color:var(--white)}
.sec-h em{font-style:normal;color:var(--orange)}

/* ── Detail Cards ─────────────────────────────────────────────────────────── */
.det-section{background:var(--black-soft);position:relative;overflow:hidden}
.det-section::before{content:'RULES';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--font-display);font-size:clamp(8rem,22vw,20rem);color:rgba(255,255,255,.02);white-space:nowrap;pointer-events:none}
.det-inner{position:relative;z-index:1}
.det-head{margin-bottom:clamp(2rem,5vw,4rem)}
.det-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;border:1px solid rgba(255,255,255,.05);border-radius:4px;overflow:hidden;background:rgba(255,255,255,.03)}
@media(max-width:820px){.det-grid{grid-template-columns:1fr}}
.det-card{background:var(--black-muted);padding:2.5rem 2rem;display:flex;flex-direction:column;gap:1.1rem;position:relative;overflow:hidden;transition:background .3s var(--ease-io)}
.det-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:0;background:var(--orange);transition:height .5s var(--ease-expo)}
.det-card:hover{background:var(--charcoal)}
.det-card:hover::before{height:100%}
.det-ghost{font-family:var(--font-display);font-size:5rem;line-height:1;color:rgba(255,255,255,.04);position:absolute;top:.8rem;right:1.2rem;pointer-events:none;transition:color .3s}
.det-card:hover .det-ghost{color:rgba(255,92,26,.07)}
.det-ico{width:50px;height:50px;background:var(--orange-dim);border:1px solid var(--border-orange);border-radius:3px;display:flex;align-items:center;justify-content:center;color:var(--orange);font-size:1.2rem;transition:background .2s,box-shadow .2s}
.det-card:hover .det-ico{background:var(--orange);color:var(--white);box-shadow:0 0 18px rgba(255,92,26,.4)}
.det-lbl{font-family:var(--font-heading);font-size:.7rem;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--fog)}
.det-val{font-family:var(--font-display);font-size:2rem;line-height:1;color:var(--white)}
.det-val .acc{color:var(--orange)}
.det-desc{font-size:.86rem;color:var(--fog);line-height:1.6;border-top:1px solid rgba(255,255,255,.05);padding-top:.9rem;margin-top:auto}

/* ── Feature Banner ───────────────────────────────────────────────────────── */
.feat-ban{background:var(--orange);padding:3.5rem var(--gutter);display:flex;align-items:center;justify-content:space-between;gap:2.5rem;flex-wrap:wrap;position:relative;overflow:hidden}
.feat-ban::before{content:'2K26';position:absolute;right:-2rem;top:50%;transform:translateY(-50%);font-family:var(--font-display);font-size:14rem;color:rgba(255,255,255,.07);line-height:1;pointer-events:none}
.feat-txt h2{font-family:var(--font-display);font-size:clamp(2rem,5vw,4rem);letter-spacing:.02em;text-transform:uppercase;color:var(--white);line-height:1}
.feat-txt p{font-family:var(--font-body);color:rgba(255,255,255,.72);font-size:1rem;margin-top:.5rem}
.feat-stats{display:flex;gap:3rem;flex-wrap:wrap}
.feat-stat{text-align:center}
.feat-sv{font-family:var(--font-display);font-size:3.5rem;line-height:1;color:var(--white)}
.feat-sl{font-family:var(--font-heading);font-size:.72rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.62);margin-top:.2rem}
@media(max-width:820px){.feat-ban{flex-direction:column;text-align:center}.feat-stats{justify-content:center}}

/* ── Committee ────────────────────────────────────────────────────────────── */
.comm-section{background:var(--black);position:relative;overflow:hidden}
.comm-section::after{content:'';position:absolute;top:0;right:0;width:400px;height:400px;background:radial-gradient(circle,rgba(255,92,26,.05) 0%,transparent 65%);pointer-events:none}
.comm-head{margin-bottom:clamp(2rem,5vw,4rem)}
.comm-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.5rem}
@media(max-width:680px){.comm-grid{grid-template-columns:1fr}}
.comm-card{background:var(--black-muted);border:1px solid rgba(255,255,255,.06);border-radius:4px;padding:2rem 2rem 2rem 1.75rem;display:flex;align-items:center;gap:1.5rem;position:relative;overflow:hidden;transition:border-color .3s,transform .3s,box-shadow .3s}
.comm-card:hover{border-color:var(--border-orange);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.4),0 0 20px rgba(255,92,26,.06)}
.comm-av{width:64px;height:64px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:1.5rem;color:var(--white);flex-shrink:0;transition:box-shadow .3s}
.comm-card:hover .comm-av{box-shadow:0 8px 24px rgba(255,92,26,.45)}
.comm-role{font-family:var(--font-heading);font-size:.7rem;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--orange);margin-bottom:.3rem}
.comm-name{font-family:var(--font-heading);font-size:1.45rem;font-weight:700;color:var(--white);line-height:1.1;letter-spacing:.02em}
.comm-tag{display:inline-flex;align-items:center;gap:.3rem;margin-top:.5rem;padding:.22rem .6rem;background:rgba(255,255,255,.04);border-radius:2px;font-size:.72rem;color:var(--fog)}

/* ── Final CTA ────────────────────────────────────────────────────────────── */
.fcta{background:var(--black-soft);text-align:center;position:relative;overflow:hidden}
.fcta::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(255,92,26,.09) 0%,transparent 70%);pointer-events:none}
.fcta-in{position:relative;z-index:1}
.fcta-ey{display:inline-block;font-family:var(--font-heading);font-size:.76rem;font-weight:500;letter-spacing:.28em;text-transform:uppercase;color:var(--orange);margin-bottom:1rem}
.fcta-h{font-family:var(--font-display);font-size:clamp(3rem,8vw,7rem);line-height:.9;text-transform:uppercase;color:var(--white);margin-bottom:1.25rem}
.fcta-h em{font-style:normal;-webkit-text-fill-color:transparent;-webkit-text-stroke:1.5px var(--orange)}
.fcta-p{max-width:480px;margin-inline:auto;color:var(--fog);font-size:1rem;line-height:1.7;margin-bottom:2.5rem}
.fcta-acts{display:flex;align-items:center;justify-content:center;gap:1rem;flex-wrap:wrap}
.btn-lg{display:inline-flex;align-items:center;gap:.75rem;padding:1.25rem 3rem;background:var(--orange);color:var(--white);font-family:var(--font-display);font-size:1.3rem;letter-spacing:.06em;text-transform:uppercase;border-radius:3px;position:relative;overflow:hidden;transition:transform .3s var(--ease-expo),box-shadow .3s var(--ease-expo);animation:pulseOrange 3s ease-in-out 3s infinite}
.btn-lg:hover{transform:translateY(-3px) scale(1.02);box-shadow:var(--orange-glow)}
.btn-out{display:inline-flex;align-items:center;gap:.5rem;padding:1.25rem 2rem;border:1px solid rgba(255,255,255,.15);color:var(--fog);font-family:var(--font-heading);font-size:.88rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;border-radius:3px;transition:border-color .15s,color .15s}
.btn-out:hover{border-color:var(--white);color:var(--white)}

/* ── Footer ───────────────────────────────────────────────────────────────── */
.footer{background:var(--black);border-top:1px solid rgba(255,255,255,.05);padding:2rem var(--gutter);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.footer-br{font-family:var(--font-display);font-size:1.15rem;letter-spacing:.06em}
.footer-br span{color:var(--orange)}
.footer-cp{font-size:.78rem;color:var(--ash)}

/* ═══ REGISTRATION PAGE ═══════════════════════════════════════════════════ */
.reg-page{min-height:100svh;background:var(--black-soft);padding-top:5rem;position:relative}
.reg-page::before{content:'';position:fixed;top:0;left:50%;transform:translateX(-50%);width:800px;height:300px;background:radial-gradient(ellipse at 50% 0%,rgba(255,92,26,.06) 0%,transparent 70%);pointer-events:none;z-index:0}
.reg-wrap{position:relative;z-index:1;padding-block:clamp(2.5rem,6vw,5rem)}
.reg-hdr{margin-bottom:clamp(2rem,5vw,4rem);animation:fadeUp .6s var(--ease-expo) both}
.back-lnk{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--font-heading);font-size:.76rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--fog);margin-bottom:1.75rem;padding-bottom:.2rem;border-bottom:1px solid transparent;transition:color .15s,border-color .15s;width:fit-content}
.back-lnk:hover{color:var(--orange);border-color:var(--orange)}
.reg-ttl{font-family:var(--font-display);font-size:clamp(2.8rem,7vw,5.5rem);line-height:.9;text-transform:uppercase;color:var(--white);letter-spacing:-.01em}
.reg-ttl span{color:var(--orange)}
.reg-sub{margin-top:1rem;font-size:.93rem;color:var(--fog);max-width:480px;line-height:1.65}
.reg-layout{display:grid;grid-template-columns:1fr 310px;gap:2rem;align-items:start}
@media(max-width:960px){.reg-layout{grid-template-columns:1fr}}

/* Sidebar */
.sidebar{position:sticky;top:5.5rem;display:flex;flex-direction:column;gap:1.2rem;animation:slideRight .7s var(--ease-expo) .2s both}
@media(max-width:960px){.sidebar{position:static;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));order:-1;animation:fadeUp .6s var(--ease-expo) .1s both}}
.sb-card{background:var(--black-muted);border:1px solid rgba(255,255,255,.06);border-radius:4px;padding:1.5rem}
.sb-ttl{font-family:var(--font-heading);font-size:.68rem;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--orange);margin-bottom:1.25rem;display:flex;align-items:center;gap:.5rem}
.sb-ttl::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}

/* Meter */
.tm-meter{display:flex;flex-direction:column;gap:.7rem}
.m-bar{display:flex;gap:4px}
.m-slot{flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,.07);transition:background .3s,box-shadow .3s}
.m-slot.capt{background:var(--orange);box-shadow:0 0 8px rgba(255,92,26,.5)}
.m-slot.fill{background:var(--lime);box-shadow:0 0 8px rgba(200,241,53,.4)}
.m-slot.req{border:1px dashed var(--fog);background:transparent}
.m-count{font-family:var(--font-display);font-size:2.4rem;color:var(--white);line-height:1}
.m-count span{color:var(--fog);font-size:1.4rem}
.m-status{font-size:.78rem;color:var(--fog);line-height:1.5}
.m-status strong{color:var(--lime)}

/* Gender */
.g-split{display:flex;flex-direction:column;gap:.6rem}
.g-row{display:flex;align-items:center;justify-content:space-between;gap:.7rem}
.g-lbl{font-family:var(--font-heading);font-size:.72rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--fog)}
.g-count{font-family:var(--font-heading);font-size:1.1rem;font-weight:700;color:var(--white)}
.g-track{flex:1;height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.g-fill{height:100%;border-radius:2px;transition:width .4s var(--ease-expo)}
.g-fill-m{background:var(--lime)}
.g-fill-f{background:var(--orange)}
.g-note{font-size:.73rem;color:var(--fog);padding-top:.5rem;border-top:1px solid rgba(255,255,255,.05)}
.g-note.warn{color:#FFB347}

/* Quick facts */
.qf{display:flex;flex-direction:column;gap:.55rem}
.qf-item{display:flex;align-items:flex-start;gap:.6rem;font-size:.8rem;color:var(--fog);line-height:1.55}
.qf-ico{color:var(--orange);flex-shrink:0;margin-top:2px;font-size:.9rem}

/* Form main */
.form-main{display:flex;flex-direction:column;gap:1.5rem;animation:slideLeft .7s var(--ease-expo) .1s both}
.f-sec{background:var(--black-muted);border:1px solid rgba(255,255,255,.06);border-radius:4px;overflow:hidden;transition:border-color .3s}
.f-sec:focus-within{border-color:var(--border-orange)}
.f-sec-hd{display:flex;align-items:center;gap:1rem;padding:1.5rem 2rem;border-bottom:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.02)}
.f-sec-num{width:36px;height:36px;background:var(--orange);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:1.1rem;color:var(--white);border-radius:2px;flex-shrink:0}
.f-sec-ttl{font-family:var(--font-heading);font-size:.95rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--white)}
.f-sec-sub{font-size:.78rem;color:var(--fog);margin-top:.15rem}
.f-sec-bd{padding:2rem}
@media(max-width:680px){.f-sec-bd{padding:1.25rem}}

/* Grid & Fields */
.f-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem}
.f-grid-full{grid-column:1/-1}
@media(max-width:640px){.f-grid{grid-template-columns:1fr}.f-grid-full{grid-column:1}}
.f-field{display:flex;flex-direction:column;gap:.45rem}
.f-lbl{font-family:var(--font-heading);font-size:.69rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--fog);transition:color .15s}
.f-field:focus-within .f-lbl{color:var(--orange)}
.i-wrap{position:relative;display:flex;align-items:center}
.i-ico{position:absolute;left:1rem;color:var(--ash);pointer-events:none;transition:color .15s;z-index:1;font-size:.85rem}
.f-field:focus-within .i-ico{color:var(--orange)}
.f-in,.f-sel{width:100%;background:var(--black-soft);border:1.5px solid rgba(255,255,255,.07);border-radius:3px;padding:.85rem 1rem .85rem 2.75rem;color:var(--white);font-size:.9rem;transition:border-color .15s,box-shadow .15s,background .15s;appearance:none;-webkit-appearance:none;caret-color:var(--orange)}
.f-in.ni,.f-sel.ni{padding-left:1rem}
.f-in::placeholder{color:var(--ash)}
.f-in:focus,.f-sel:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,92,26,.1);background:var(--charcoal)}
.sel-wrap{position:relative}
.sel-chev{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--ash);transition:color .15s,transform .15s;font-size:.85rem}
.f-field:focus-within .sel-chev{color:var(--orange);transform:translateY(-50%) rotate(180deg)}

/* Teammate rows */
.tm-list{display:flex;flex-direction:column;gap:1px;border:1px solid rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.tm-row{background:var(--black-soft);padding:1.2rem 1.5rem;display:grid;grid-template-columns:1.8fr 1fr 1fr auto;gap:1rem;align-items:end;border-bottom:1px solid rgba(255,255,255,.04);animation:rowIn .4s var(--ease-back) both;transition:background .15s}
.tm-row:hover{background:var(--charcoal)}
.tm-row:last-child{border-bottom:none}
.tm-num{font-family:var(--font-display);font-size:.72rem;color:var(--orange);letter-spacing:.1em;display:block;margin-bottom:.3rem}
@media(max-width:640px){.tm-row{grid-template-columns:1fr 1fr}.tm-row>div:first-child{grid-column:1/-1}}
@media(max-width:420px){.tm-row{grid-template-columns:1fr}}
.btn-rm{width:38px;height:38px;background:rgba(255,61,61,.08);border:1px solid rgba(255,61,61,.2);border-radius:3px;display:flex;align-items:center;justify-content:center;color:#FF5C5C;flex-shrink:0;transition:background .15s,border-color .15s,transform .15s}
.btn-rm:hover:not(:disabled){background:rgba(255,61,61,.2);border-color:#FF5C5C;transform:scale(1.08)}
.btn-rm:disabled{opacity:.25;cursor:not-allowed}
.btn-add-tm{display:inline-flex;align-items:center;gap:.6rem;margin-top:1.2rem;padding:.85rem 1.75rem;border:1.5px dashed var(--border-orange);border-radius:3px;background:transparent;color:var(--orange);font-family:var(--font-heading);font-size:.83rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;transition:background .15s,border-color .15s,box-shadow .15s,transform .15s}
.btn-add-tm:hover:not(:disabled){background:var(--orange-dim);border-color:var(--orange);border-style:solid;box-shadow:0 4px 16px rgba(255,92,26,.15);transform:translateY(-1px)}
.btn-add-tm:disabled{opacity:.28;cursor:not-allowed}

/* Submit section */
.sub-sec{background:var(--black-muted);border:1px solid rgba(255,255,255,.06);border-radius:4px;padding:2.5rem 2rem;display:flex;flex-direction:column;align-items:flex-start;gap:1.5rem}
@media(max-width:680px){.sub-sec{padding:1.5rem}}
.sub-notice{display:flex;align-items:flex-start;gap:.75rem;padding:1rem 1.2rem;background:rgba(200,241,53,.05);border:1px solid rgba(200,241,53,.15);border-radius:3px;width:100%}
.sub-ni{color:var(--lime);flex-shrink:0;margin-top:1px;font-size:.85rem}
.sub-nt{font-size:.83rem;color:rgba(200,241,53,.78);line-height:1.55}
.sub-nt strong{color:var(--lime)}
.sub-warn{background:rgba(255,179,71,.05);border-color:rgba(255,179,71,.25)}
.sub-warn .sub-ni{color:#FFB347}
.sub-warn .sub-nt{color:rgba(255,179,71,.78)}
.btn-sub{display:inline-flex;align-items:center;gap:.75rem;padding:1.2rem 3.5rem;background:var(--orange);color:var(--white);font-family:var(--font-display);font-size:1.35rem;letter-spacing:.07em;text-transform:uppercase;border-radius:3px;position:relative;overflow:hidden;transition:transform .3s var(--ease-expo),box-shadow .3s var(--ease-expo);animation:pulseOrange 3s ease-in-out 3s infinite}
.btn-sub:hover{transform:translateY(-3px) scale(1.02);box-shadow:var(--orange-glow)}
.btn-sub:disabled{opacity:.4;cursor:not-allowed;animation:none}

/* Success overlay */
.suc-ov{position:fixed;inset:0;z-index:9999;background:rgba(10,10,8,.93);display:flex;align-items:center;justify-content:center;padding:var(--gutter);backdrop-filter:blur(12px);animation:fadeIn .35s var(--ease-expo) both}
.suc-card{background:var(--black-muted);border:1px solid var(--border-orange);border-radius:6px;padding:3.5rem;max-width:480px;width:100%;text-align:center;position:relative;overflow:hidden;animation:scaleIn .5s var(--ease-back) .1s both}
.suc-card::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:200px;height:1px;background:linear-gradient(to right,transparent,var(--orange),transparent)}
.suc-ring{width:90px;height:90px;border-radius:50%;background:var(--orange-dim);border:2px solid var(--orange);display:flex;align-items:center;justify-content:center;margin:0 auto 2rem;color:var(--orange);font-size:2rem;animation:pulseOrange 2.5s ease-in-out infinite}
.suc-ttl{font-family:var(--font-display);font-size:3.5rem;text-transform:uppercase;color:var(--white);line-height:1;margin-bottom:1rem}
.suc-msg{font-size:.93rem;color:var(--fog);line-height:1.7;margin-bottom:2.5rem}
.suc-msg strong{color:var(--orange)}
.suc-acts{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.btn-suc{display:inline-flex;align-items:center;gap:.6rem;padding:.85rem 2rem;background:var(--orange);color:var(--white);font-family:var(--font-heading);font-size:.88rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;border-radius:3px;transition:transform .15s,box-shadow .15s}
.btn-suc:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(255,92,26,.4)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useCallback,useMemo,useEffect,useRef}=React;

/* ── Constants ──────────────────────────────────────────────────────────── */
const BRANCHES=['CSE','ECE','ME','CE','EE','IT','AIDS','AIML','MBA','MCA','Other'];
const YEARS=['1st Year','2nd Year','3rd Year','4th Year'];
const MIN_X=5,MAX_X=7;
let _idc=0;const mkId=()=>`tm_${++_idc}_${Math.random().toString(36).slice(2,5)}`;
const blankTm=()=>({id:mkId(),name:'',gender:'',branch:''});
const INIT={teamName:'',captainName:'',contactNumber:'',captainYear:'',captainBranch:'',captainGender:'',teammates:Array.from({length:MIN_X},blankTm)};

/* ── Mini SVG Icons ─────────────────────────────────────────────────────── */
const Ico=({p,s=16})=>(
  <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    {typeof p==='string'?<path d={p}/>:p}
  </svg>
);
const I={
  arrow:"M5 12h14M12 5l7 7-7 7",
  arrowL:"M19 12H5M12 19l-7-7 7-7",
  user:"M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z",
  users:"M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75",
  phone:"M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.36 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z",
  rupee:"M6 3h12M6 8h12M6 13l8.5 8M6 13h3a4 4 0 0 0 0-8",
  trophy:"M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18v5zM4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22M18 2H6v7a6 6 0 0 0 12 0V2z",
  shield:"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z",
  zap:"M13 2L3 14h9l-1 8 10-12h-9l1-8z",
  star:"M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z",
  check:<><polyline points="20 6 9 17 4 12"/></>,
  checkC:<><circle cx="12" cy="12" r="10"/><polyline points="9 12 12 15 16 10"/></>,
  plus:"M12 5v14M5 12h14",
  trash:"M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2",
  chev:"M6 9l6 6 6-6",
  home:"M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2zM9 22V12h6v10",
  book:"M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20V2H6.5A2.5 2.5 0 0 0 4 4.5v15z",
  hash:"M4 9h16M4 15h16M10 3L8 21M16 3l-2 18",
  alert:"M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01",
  info:"M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10zM12 16v-4M12 8h.01",
  map:"M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z",
  eye:"M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8zM12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z",
};

/* ── Simple hash router ─────────────────────────────────────────────────── */
const useRoute=()=>{
  const[path,setPath]=useState(window.location.hash.replace('#','')||'/');
  useEffect(()=>{
    const h=()=>setPath(window.location.hash.replace('#','')||'/');
    window.addEventListener('hashchange',h);
    return()=>window.removeEventListener('hashchange',h);
  },[]);
  const go=p=>{window.location.hash=p;window.scrollTo({top:0,behavior:'instant'});};
  return{path,go};
};

/* ── Landing Page ───────────────────────────────────────────────────────── */
const Landing=({go})=>{
  const dets=[
    {icon:'users',lbl:'Team Composition',val:<>6–<span className="acc">8</span></>,unit:'PLAYERS',desc:'Min 3 Boys & 3 Girls strictly required per team. Mixed gender format.'},
    {icon:'rupee',lbl:'Registration Fee',val:<>₹<span className="acc">100</span></>,unit:'PER TEAM',desc:'One-time flat fee for the full team. Payable at the time of registration.'},
    {icon:'trophy',lbl:'Event Type',val:<><span className="acc">INTER</span></>,unit:'COLLEGE',desc:'Open to all eligible students from participating colleges. Team event format.'},
  ];
  const comm=[
    {role:'Sports Incharge',name:'AK Kaniraja',init:'AK',bg:'#FF5C1A'},
    {role:'College PTI',name:'Yuvraj Singh',init:'YS',bg:'#C8F135',fc:'#0A0A08'},
    {role:'General Sports Secretary',name:'Shivam Sharma',init:'SS',bg:'#FF5C1A'},
    {role:'Tournament Manager',name:'Ashutosh Paliwal',init:'AP',bg:'#C8F135',fc:'#0A0A08'},
  ];
  const ticks=['SANGARSH BADMIN2K26','REGISTER YOUR TEAM NOW','MIXED TEAM EVENT','₹100 ENTRY FEE','MIN 3 BOYS + 3 GIRLS','INTER-COLLEGE CHAMPIONSHIP'];

  /* Intersection observer for reveal */
  useEffect(()=>{
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(e=>e.isIntersecting&&e.target.classList.add('vis'));
    },{threshold:.1});
    document.querySelectorAll('.rv').forEach(el=>obs.observe(el));
    return()=>obs.disconnect();
  },[]);

  return(
    <div className="page-in">
      {/* Nav */}
      <nav className="nav">
        <div className="nav-wm"><span className="nav-wm-m">SANGARSH</span><span className="nav-wm-y">2K26</span></div>
        <button className="nav-btn" onClick={()=>go('/register')}>
          Register Now <Ico p={I.arrow} s={15}/>
        </button>
      </nav>

      {/* Hero */}
      <section className="hero">
        <div className="hero-bg">
          <img src="https://images.unsplash.com/photo-1626224583764-f87db24ac4ea?w=1600&q=80" alt="Badminton" loading="eager"/>
        </div>
        <div className="hero-stripe"/>
        <div className="hero-in">
          <div className="hero-lbl"><span className="hero-dot"/>Inter-College Badminton · 2026</div>
          <h1 className="hero-h1">
            <span className="hero-l1">SMASH YOUR</span>
            <span className="hero-l2">WAY TO</span>
            <span className="hero-l3">GLORY</span>
          </h1>
          <p className="hero-tn">at&nbsp;&nbsp;<strong>SANGARSH BADMIN2K26</strong></p>
          <div className="hero-ctas">
            <button className="cta-prim" onClick={()=>go('/register')}>
              <span>Register Your Team</span><Ico p={I.arrow} s={20}/>
            </button>
            <button className="cta-sec" onClick={()=>document.getElementById('det')?.scrollIntoView({behavior:'smooth'})}>
              <Ico p={I.info} s={14}/>View Tournament Info
            </button>
          </div>
        </div>
        <div className="hero-scroll"><span>Scroll</span><div className="hero-scroll-ln"/></div>
      </section>

      {/* Ticker */}
      <div className="ticker-wrap" aria-hidden="true">
        <div className="ticker-tr">
          {[...ticks,...ticks].map((t,i)=>(
            <span key={i} className="ticker-it">{t}<span className="ticker-sep"/></span>
          ))}
        </div>
      </div>

      {/* Details */}
      <section id="det" className="det-section sec">
        <div className="wrap det-inner">
          <div className="det-head rv" style={{transitionDelay:'0s'}}>
            <div className="sec-overline"><Ico p={I.zap} s={13}/>Tournament Rules</div>
            <h2 className="sec-h">Know the<br/><em>Game Plan</em></h2>
          </div>
          <div className="det-grid">
            {dets.map((d,i)=>(
              <div key={i} className="det-card rv" style={{transitionDelay:`${i*.12}s`}}>
                <span className="det-ghost" aria-hidden="true">{String(i+1).padStart(2,'0')}</span>
                <div className="det-ico"><Ico p={I[d.icon]} s={22}/></div>
                <div className="det-lbl">{d.lbl}</div>
                <div className="det-val">{d.val} <span style={{fontSize:'.88rem',color:'var(--fog)',fontFamily:'var(--font-heading)',letterSpacing:'.15em'}}>{d.unit}</span></div>
                <p className="det-desc">{d.desc}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* Feature banner */}
      <div className="feat-ban rv">
        <div className="feat-txt">
          <h2>One Court.<br/>One Champion.</h2>
          <p>Show up. Smash it. Own the court.</p>
        </div>
        <div className="feat-stats">
          {[['8','Max Members'],['3+3','Gender Rule'],['₹100','Entry Fee']].map(([v,l],i)=>(
            <div key={i} className="feat-stat">
              <div className="feat-sv">{v}</div>
              <div className="feat-sl">{l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Committee */}
      <section id="comm" className="comm-section sec">
        <div className="wrap">
          <div className="comm-head rv">
            <div className="sec-overline"><Ico p={I.star} s={13}/>Organizing Committee</div>
            <h2 className="sec-h">The <em>Team</em><br/>Behind the Game</h2>
          </div>
          <div className="comm-grid">
            {comm.map((c,i)=>(
              <div key={i} className="comm-card rv" style={{transitionDelay:`${i*.1}s`}}>
                <div className="comm-av" style={{background:c.bg,color:c.fc||'#fff'}}>{c.init}</div>
                <div>
                  <p className="comm-role">{c.role}</p>
                  <h3 className="comm-name">{c.name}</h3>
                  <div className="comm-tag"><Ico p={I.shield} s={11}/>SANGARSH 2K26</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* Final CTA */}
      <section className="fcta sec">
        <div className="wrap fcta-in">
          <span className="fcta-ey">Don't Wait — Limited Slots</span>
          <h2 className="fcta-h">REGISTER<br/><em>TODAY</em></h2>
          <p className="fcta-p">Build your squad of 6–8. Min 3 boys and 3 girls. Entry is just <strong style={{color:'var(--orange)'}}>₹100</strong> per team.</p>
          <div className="fcta-acts">
            <button className="btn-lg" onClick={()=>go('/register')}><span>Register Your Team</span><Ico p="M9 18l6-6-6-6" s={22}/></button>
            <button className="btn-out" onClick={()=>document.getElementById('comm')?.scrollIntoView({behavior:'smooth'})}><Ico p={I.map} s={15}/>Meet Organizers</button>
          </div>
        </div>
      </section>

      <footer className="footer">
        <div className="footer-br">SANGARSH <span>2K26</span></div>
        <p className="footer-cp">Organized by the Sports Department · All Rights Reserved</p>
      </footer>

      {/* Reveal CSS */}
      <style>{`.rv{opacity:0;transform:translateY(28px);transition:opacity .65s var(--ease-expo),transform .65s var(--ease-expo)}.rv.vis{opacity:1;transform:translateY(0)}`}</style>
    </div>
  );
};

/* ── Registration Form ──────────────────────────────────────────────────── */
const RegForm=({go})=>{
  const[form,setForm]=useState(INIT);
  const[showSuc,setShowSuc]=useState(false);
  const[busy,setBusy]=useState(false);

  const sf=useCallback((k,v)=>setForm(p=>({...p,[k]:v})),[]);
  const utm=useCallback((id,k,v)=>setForm(p=>({...p,teammates:p.teammates.map(t=>t.id===id?{...t,[k]:v}:t)})),[]);
  const addTm=useCallback(()=>setForm(p=>p.teammates.length>=MAX_X?p:{...p,teammates:[...p.teammates,blankTm()]}),[]);
  const rmTm=useCallback(id=>setForm(p=>p.teammates.length<=MIN_X?p:{...p,teammates:p.teammates.filter(t=>t.id!==id)}),[]);

  const total=form.teammates.length+1;
  const gt=useMemo(()=>{
    let m=form.captainGender==='Male'?1:0,f=form.captainGender==='Female'?1:0;
    form.teammates.forEach(t=>{if(t.gender==='Male')m++;else if(t.gender==='Female')f++;});
    return{m,f};
  },[form.captainGender,form.teammates]);
  const grMet=gt.m>=3&&gt.f>=3;

  const handleSub=async e=>{
    e.preventDefault();
    if(!form.teamName.trim()||!form.captainName.trim()||!form.contactNumber.trim()){alert('Fill in all captain/team fields.');return;}
    if(!/^\d{10}$/.test(form.contactNumber)){alert('Contact must be 10 digits.');return;}
    if(!form.captainYear||!form.captainBranch||!form.captainGender){alert('Complete captain year, branch & gender.');return;}
    const bad=form.teammates.findIndex(t=>!t.name.trim()||!t.gender||!t.branch);
    if(bad!==-1){alert(`Complete all details for Member ${bad+2}.`);return;}
    if(!grMet){alert(`Gender rule not met!\n${gt.m} Boys, ${gt.f} Girls — need min 3 of each.`);return;}
    setBusy(true);
    await new Promise(r=>setTimeout(r,800));
    console.log('Registration:',form);
    setBusy(false);setShowSuc(true);
  };

  /* Inline icon helpers */
  const IcoSm=({p})=><span className="i-ico"><Ico p={p} s={14}/></span>;

  return(
    <div className="reg-page page-in">
      <div className="wrap reg-wrap">

        {/* Header */}
        <header className="reg-hdr">
          <button className="back-lnk" onClick={()=>go('/')}><Ico p={I.arrowL} s={14}/>Back to Home</button>
          <h1 className="reg-ttl">Team <span>Registration</span></h1>
          <p className="reg-sub">Complete the form to register your team for SANGARSH BADMIN2K26.</p>
        </header>

        <div className="reg-layout">
          {/* ── Form ── */}
          <main className="form-main">
            <form onSubmit={handleSub} noValidate>

              {/* Section 1 */}
              <div className="f-sec">
                <div className="f-sec-hd">
                  <div className="f-sec-num">1</div>
                  <div><p className="f-sec-ttl">Team &amp; Captain</p><p className="f-sec-sub">Captain is the primary contact.</p></div>
                </div>
                <div className="f-sec-bd">
                  <div className="f-grid">

                    <div className="f-field f-grid-full">
                      <label className="f-lbl">Team Name *</label>
                      <div className="i-wrap"><IcoSm p={I.users}/><input type="text" className="f-in" placeholder="e.g. The Smashers" value={form.teamName} onChange={e=>sf('teamName',e.target.value)} maxLength={60}/></div>
                    </div>

                    <div className="f-field">
                      <label className="f-lbl">Captain Name *</label>
                      <div className="i-wrap"><IcoSm p={I.user}/><input type="text" className="f-in" placeholder="Full name" value={form.captainName} onChange={e=>sf('captainName',e.target.value)} maxLength={80}/></div>
                    </div>

                    <div className="f-field">
                      <label className="f-lbl">Contact No. *</label>
                      <div className="i-wrap"><IcoSm p={I.phone}/><input type="tel" className="f-in" placeholder="10-digit mobile" value={form.contactNumber} onChange={e=>sf('contactNumber',e.target.value.replace(/\D/g,''))} maxLength={10}/></div>
                    </div>

                    <div className="f-field">
                      <label className="f-lbl">Captain Gender *</label>
                      <div className="sel-wrap"><div className="i-wrap"><IcoSm p={I.user}/><select className="f-sel" value={form.captainGender} onChange={e=>sf('captainGender',e.target.value)}><option value="">Select Gender</option><option>Male</option><option>Female</option></select></div><span className="sel-chev"><Ico p={I.chev} s={14}/></span></div>
                    </div>

                    <div className="f-field">
                      <label className="f-lbl">Year of Study *</label>
                      <div className="sel-wrap"><div className="i-wrap"><IcoSm p={I.book}/><select className="f-sel" value={form.captainYear} onChange={e=>sf('captainYear',e.target.value)}><option value="">Select Year</option>{YEARS.map(y=><option key={y}>{y}</option>)}</select></div><span className="sel-chev"><Ico p={I.chev} s={14}/></span></div>
                    </div>

                    <div className="f-field">
                      <label className="f-lbl">Branch *</label>
                      <div className="sel-wrap"><div className="i-wrap"><IcoSm p={I.hash}/><select className="f-sel" value={form.captainBranch} onChange={e=>sf('captainBranch',e.target.value)}><option value="">Select Branch</option>{BRANCHES.map(b=><option key={b}>{b}</option>)}</select></div><span className="sel-chev"><Ico p={I.chev} s={14}/></span></div>
                    </div>

                  </div>
                </div>
              </div>

              {/* Section 2 */}
              <div className="f-sec">
                <div className="f-sec-hd">
                  <div className="f-sec-num">2</div>
                  <div><p className="f-sec-ttl">Teammates</p><p className="f-sec-sub">Add {MIN_X}–{MAX_X} teammates (total 6–8). Min 3 boys & 3 girls.</p></div>
                </div>
                <div className="f-sec-bd">
                  <div className="tm-list">
                    {form.teammates.map((tm,idx)=>(
                      <div key={tm.id} className="tm-row" style={{animationDelay:`${idx*.04}s`}}>
                        <div className="f-field">
                          <span className="tm-num">MEMBER {idx+2}</span>
                          <div className="i-wrap">
                            <span className="i-ico"><Ico p={I.user} s={14}/></span>
                            <input type="text" className="f-in" placeholder="Full name" value={tm.name} onChange={e=>utm(tm.id,'name',e.target.value)} maxLength={80}/>
                          </div>
                        </div>
                        <div className="f-field">
                          <label className="f-lbl">Gender</label>
                          <div className="sel-wrap"><select className="f-sel ni" value={tm.gender} onChange={e=>utm(tm.id,'gender',e.target.value)}><option value="">Gender</option><option>Male</option><option>Female</option></select><span className="sel-chev"><Ico p={I.chev} s={14}/></span></div>
                        </div>
                        <div className="f-field">
                          <label className="f-lbl">Branch</label>
                          <div className="sel-wrap"><select className="f-sel ni" value={tm.branch} onChange={e=>utm(tm.id,'branch',e.target.value)}><option value="">Branch</option>{BRANCHES.map(b=><option key={b}>{b}</option>)}</select><span className="sel-chev"><Ico p={I.chev} s={14}/></span></div>
                        </div>
                        <button type="button" className="btn-rm" onClick={()=>rmTm(tm.id)} disabled={form.teammates.length<=MIN_X} title="Remove">
                          <Ico p={I.trash} s={15}/>
                        </button>
                      </div>
                    ))}
                  </div>
                  <button type="button" className="btn-add-tm" onClick={addTm} disabled={form.teammates.length>=MAX_X}>
                    <Ico p={I.plus} s={15}/>
                    {form.teammates.length>=MAX_X?'Maximum teammates reached (7)':`Add Teammate (${form.teammates.length}/${MAX_X})`}
                  </button>
                </div>
              </div>

              {/* Submit */}
              <div className="sub-sec">
                <div className="sub-notice">
                  <span className="sub-ni"><Ico p={I.info} s={14}/></span>
                  <p className="sub-nt">By submitting you confirm all details are accurate. Fee of <strong>₹100</strong> payable at venue. Ensure <strong>min. 3 Boys & 3 Girls</strong>.</p>
                </div>
                {!grMet&&(form.captainGender||form.teammates.some(t=>t.gender))&&(
                  <div className="sub-notice sub-warn">
                    <span className="sub-ni"><Ico p={I.alert} s={14}/></span>
                    <p className="sub-nt">Gender rule not met: <strong>{gt.m} Boys, {gt.f} Girls</strong>. Need at least 3 of each.</p>
                  </div>
                )}
                <button type="submit" className="btn-sub" disabled={busy}>
                  <span>{busy?'Submitting…':'Submit Registration'}</span>
                  {!busy&&<Ico p={I.checkC} s={20}/>}
                </button>
              </div>

            </form>
          </main>

          {/* ── Sidebar ── */}
          <aside className="sidebar">

            <div className="sb-card">
              <p className="sb-ttl"><Ico p={I.users} s={13}/>Team Size</p>
              <div className="tm-meter">
                <div className="m-bar">
                  {Array.from({length:8},(_,i)=>(
                    <div key={i} className={`m-slot${i===0?' capt':i<total?' fill':i<6?' req':''}`}/>
                  ))}
                </div>
                <div className="m-count">{total}<span> / 8</span></div>
                <p className="m-status">
                  {total<6?<>Add <strong>{6-total} more</strong> member(s).</>:total===8?<><strong style={{color:'var(--orange)'}}>Team full!</strong></>:<><strong>{total} members</strong> — {8-total} more optional.</>}
                </p>
              </div>
            </div>

            <div className="sb-card">
              <p className="sb-ttl"><Ico p={I.users} s={13}/>Gender Split</p>
              <div className="g-split">
                {[['Boys',gt.m,'m'],['Girls',gt.f,'f']].map(([lbl,cnt,k])=>(
                  <div key={k} className="g-row">
                    <span className="g-lbl">{lbl}</span>
                    <div className="g-track"><div className={`g-fill g-fill-${k}`} style={{width:`${Math.min(cnt/8*100,100)}%`}}/></div>
                    <span className="g-count">{cnt}</span>
                  </div>
                ))}
                <p className={`g-note${grMet?'':' warn'}`}>
                  {grMet?'✓ Gender requirement met (3+3 minimum)':`⚠ Need ${Math.max(0,3-gt.m)} more boy(s) & ${Math.max(0,3-gt.f)} more girl(s)`}
                </p>
              </div>
            </div>

            <div className="sb-card">
              <p className="sb-ttl"><Ico p={I.info} s={13}/>Quick Facts</p>
              <ul className="qf">
                {['Team: 6–8 members including captain.','Min 3 Boys AND 3 Girls required.','Fee: ₹100 per team at venue.','Inter-college knockout format.','Must be enrolled students.'].map((f,i)=>(
                  <li key={i} className="qf-item"><span className="qf-ico"><Ico p={I.checkC} s={13}/></span>{f}</li>
                ))}
              </ul>
            </div>

          </aside>
        </div>
      </div>

      {/* Success overlay */}
      {showSuc&&(
        <div className="suc-ov" onClick={e=>e.target===e.currentTarget&&(setShowSuc(false),go('/'))}>
          <div className="suc-card">
            <div className="suc-ring"><Ico p={I.checkC} s={42}/></div>
            <h2 className="suc-ttl">YOU'RE IN!</h2>
            <p className="suc-msg">Team <strong>{form.teamName}</strong> is registered for <strong>SANGARSH BADMIN2K26</strong>.<br/><br/>Contact captain <strong>{form.captainName}</strong> for updates. See you on court!</p>
            <div className="suc-acts">
              <button className="btn-suc" onClick={()=>{setShowSuc(false);go('/');}}>
                <Ico p={I.home} s={16}/>Back to Home
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

/* ── App Root ────────────────────────────────────────────────────────────── */
const App=()=>{
  const{path,go}=useRoute();
  return path==='/register'?<RegForm go={go}/>:<Landing go={go}/>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
